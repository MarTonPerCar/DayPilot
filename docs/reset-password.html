<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DayPilot</title>
<style>
  :root { color-scheme: light dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #eef3ee;
    color: #1a2b1f;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #12201a; color: #e6f0e8; }
  }
  .card {
    max-width: 420px;
    width: 100%;
    margin: 24px;
    padding: 32px 28px;
    border-radius: 20px;
    background: #ffffff;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
    text-align: center;
    box-sizing: border-box;
  }
  @media (prefers-color-scheme: dark) {
    .card { background: #1c2e22; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4); }
  }
  .icon { font-size: 56px; line-height: 1; margin-bottom: 16px; }
  h1 { font-size: 22px; margin: 0 0 12px; }
  p { font-size: 15px; line-height: 1.5; color: #4a5a4d; margin: 0; }
  @media (prefers-color-scheme: dark) { p { color: #a9bcae; } }
  .success .icon { color: #4a7c59; }
  .error .icon { color: #b3261e; }
  .form .icon { color: #4a7c59; }

  form { margin-top: 20px; text-align: left; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; color: #4a5a4d; }
  @media (prefers-color-scheme: dark) { label { color: #a9bcae; } }
  input[type="password"] {
    width: 100%;
    box-sizing: border-box;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid #cdd9cf;
    background: #f7faf7;
    color: #1a2b1f;
    font-size: 15px;
  }
  @media (prefers-color-scheme: dark) {
    input[type="password"] { background: #16241a; border-color: #33482f; color: #e6f0e8; }
  }
  input[type="password"]:focus { outline: none; border-color: #4a7c59; }
  .field-error { font-size: 13px; color: #b3261e; margin-top: 8px; min-height: 16px; text-align: left; }
  button {
    width: 100%;
    margin-top: 22px;
    padding: 13px 0;
    border: none;
    border-radius: 14px;
    background: #4a7c59;
    color: #ffffff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: default; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon" id="icon">⏳</div>
    <h1 id="title">…</h1>
    <p id="message"></p>

    <form id="form" style="display:none;">
      <label id="labelNew" for="newPassword"></label>
      <input type="password" id="newPassword" autocomplete="new-password" required minlength="6" />

      <label id="labelConfirm" for="confirmPassword"></label>
      <input type="password" id="confirmPassword" autocomplete="new-password" required minlength="6" />

      <div class="field-error" id="fieldError"></div>

      <button type="submit" id="submitBtn"></button>
    </form>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function () {
  var SUPABASE_URL = 'https://xcsaajaslvaqkhghkwpb.supabase.co';
  var SUPABASE_KEY = 'sb_publishable_y5-_I0EguDDK51MGzZMCKg_r2mYYZVG';

  var lang = (navigator.language || 'es').slice(0, 2);
  if (['es', 'en', 'de'].indexOf(lang) === -1) lang = 'es';

  var text = {
    es: {
      loading: { title: 'Comprobando enlace…', message: 'Un momento, por favor.' },
      form: {
        title: 'Elige una nueva contraseña',
        message: 'Escribe y confirma tu nueva contraseña para tu cuenta de DayPilot.',
        labelNew: 'Nueva contraseña',
        labelConfirm: 'Confirmar contraseña',
        submit: 'Guardar contraseña',
        mismatch: 'Las contraseñas no coinciden.',
        tooShort: 'La contraseña debe tener al menos 6 caracteres.',
        updateError: 'No se pudo guardar la contraseña. Inténtalo de nuevo.'
      },
      success: { title: '¡Contraseña actualizada!', message: 'Ya puedes volver a la app de DayPilot e iniciar sesión con tu nueva contraseña.' },
      error: { title: 'Este enlace ya no es válido', message: 'Puede que ya lo hayas usado antes, o que haya caducado. Solicita un nuevo email desde la app para restablecer tu contraseña.' }
    },
    en: {
      loading: { title: 'Checking link…', message: 'Just a moment, please.' },
      form: {
        title: 'Choose a new password',
        message: 'Enter and confirm your new password for your DayPilot account.',
        labelNew: 'New password',
        labelConfirm: 'Confirm password',
        submit: 'Save password',
        mismatch: "Passwords don't match.",
        tooShort: 'Password must be at least 6 characters.',
        updateError: "Couldn't save the password. Please try again."
      },
      success: { title: 'Password updated!', message: 'You can now go back to the DayPilot app and log in with your new password.' },
      error: { title: 'This link is no longer valid', message: "It may have already been used, or it's expired. Request a new password reset email from the app." }
    },
    de: {
      loading: { title: 'Link wird geprüft…', message: 'Einen Moment bitte.' },
      form: {
        title: 'Neues Passwort wählen',
        message: 'Gib dein neues Passwort für dein DayPilot-Konto ein und bestätige es.',
        labelNew: 'Neues Passwort',
        labelConfirm: 'Passwort bestätigen',
        submit: 'Passwort speichern',
        mismatch: 'Die Passwörter stimmen nicht überein.',
        tooShort: 'Das Passwort muss mindestens 6 Zeichen haben.',
        updateError: 'Das Passwort konnte nicht gespeichert werden. Bitte versuche es erneut.'
      },
      success: { title: 'Passwort aktualisiert!', message: 'Du kannst jetzt zur DayPilot-App zurückkehren und dich mit deinem neuen Passwort anmelden.' },
      error: { title: 'Dieser Link ist nicht mehr gültig', message: 'Er wurde möglicherweise bereits verwendet oder ist abgelaufen. Fordere in der App eine neue E-Mail zum Zurücksetzen an.' }
    }
  }[lang];

  var card = document.getElementById('card');
  var icon = document.getElementById('icon');
  var title = document.getElementById('title');
  var message = document.getElementById('message');
  var form = document.getElementById('form');
  var newPasswordInput = document.getElementById('newPassword');
  var confirmPasswordInput = document.getElementById('confirmPassword');
  var fieldError = document.getElementById('fieldError');
  var submitBtn = document.getElementById('submitBtn');

  document.getElementById('labelNew').textContent = text.form.labelNew;
  document.getElementById('labelConfirm').textContent = text.form.labelConfirm;
  submitBtn.textContent = text.form.submit;

  function showState(state, t) {
    card.className = 'card ' + (state === 'success' ? 'success' : state === 'error' ? 'error' : state === 'form' ? 'form' : '');
    icon.textContent = state === 'success' ? '✓' : state === 'error' ? '✕' : state === 'form' ? '🔒' : '⏳';
    title.textContent = t.title;
    message.textContent = t.message;
    form.style.display = state === 'form' ? 'block' : 'none';
  }

  showState('loading', text.loading);

  var params = new URLSearchParams(
    (location.hash || '').replace(/^#/, '') || location.search.replace(/^\?/, '')
  );
  if (params.get('error') || params.get('error_description')) {
    showState('error', text.error);
    return;
  }

  var client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var handled = false;

  client.auth.onAuthStateChange(function (event, session) {
    if (handled) return;
    if (event === 'PASSWORD_RECOVERY' && session) {
      handled = true;
      showState('form', text.form);
    }
  });

  // Some flows establish the recovery session without ever firing
  // PASSWORD_RECOVERY explicitly — fall back to a plain session check.
  setTimeout(function () {
    if (handled) return;
    client.auth.getSession().then(function (result) {
      if (handled) return;
      handled = true;
      if (result.data && result.data.session) {
        showState('form', text.form);
      } else {
        showState('error', text.error);
      }
    });
  }, 2500);

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    fieldError.textContent = '';

    var pw = newPasswordInput.value;
    var confirmPw = confirmPasswordInput.value;

    if (pw.length < 6) {
      fieldError.textContent = text.form.tooShort;
      return;
    }
    if (pw !== confirmPw) {
      fieldError.textContent = text.form.mismatch;
      return;
    }

    submitBtn.disabled = true;
    client.auth.updateUser({ password: pw }).then(function (result) {
      if (result.error) {
        fieldError.textContent = text.form.updateError;
        submitBtn.disabled = false;
      } else {
        showState('success', text.success);
        client.auth.signOut();
      }
    }).catch(function () {
      fieldError.textContent = text.form.updateError;
      submitBtn.disabled = false;
    });
  });
})();
</script>
</body>
</html>
