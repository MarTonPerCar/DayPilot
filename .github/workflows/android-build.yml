name: Android Build

on:
  push:
    tags:
      # v{V}.{SV}.X.Y.Z — V=1 Android, SV=2 this branch (TestFinal)
      - 'v1.2.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> local.properties
          echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          APK_PATH="$(ls app/build/outputs/apk/debug/*.apk | head -n 1)"
          cp "$APK_PATH" DayPilot-Incremento-Android-TestFinal.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DayPilot-Incremento-Android-TestFinal
          path: DayPilot-Incremento-Android-TestFinal.apk

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DayPilot-Incremento-Android-TestFinal.apk

      - name: Move floating "latest" tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f incremento-android-testfinal-latest
          git push origin -f incremento-android-testfinal-latest

      - name: Update "latest" release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: incremento-android-testfinal-latest
          name: "Latest build (Incremento-Android-TestFinal)"
          files: DayPilot-Incremento-Android-TestFinal.apk
