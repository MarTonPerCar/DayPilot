name: Android Test

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        # local.properties is gitignored (real Supabase credentials) and BuildConfig reads it
        # at build time. These tests override every Supabase-touching dependency and never call
        # real endpoints (they only need the client to construct without crashing), so a
        # placeholder is enough — no real secrets needed for this workflow.
        run: |
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          echo "SUPABASE_URL=https://placeholder.supabase.co" >> local.properties
          echo "SUPABASE_KEY=placeholder" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Publish per-test results
        uses: dorny/test-reporter@v2
        if: success() || failure()
        with:
          name: Android Test Results
          path: app/build/test-results/testDebugUnitTest/*.xml
          reporter: java-junit
