name: Flutter Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Write env.json
        shell: bash
        run: |
          cat > env.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_KEY": "${{ secrets.SUPABASE_KEY }}"
          }
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows release
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile installer
        run: iscc installer\daypilot_installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DayPilot-Setup
          path: installer\Output\DayPilot-Setup.exe

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/DayPilot-Setup.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libayatana-appindicator3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable

      - name: Write env.json
        run: |
          cat > env.json <<EOF
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_KEY": "${{ secrets.SUPABASE_KEY }}"
          }
          EOF

      - name: Get dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux release
        run: flutter build linux --release

      - name: Build .deb package
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"

          PKGROOT="$GITHUB_WORKSPACE/debroot"
          mkdir -p "$PKGROOT/DEBIAN"
          mkdir -p "$PKGROOT/opt/daypilot"
          mkdir -p "$PKGROOT/usr/bin"
          mkdir -p "$PKGROOT/usr/share/applications"
          mkdir -p "$PKGROOT/usr/share/icons/hicolor/256x256/apps"

          cp -r build/linux/x64/release/bundle/* "$PKGROOT/opt/daypilot/"
          cp assets/icon/icon.png "$PKGROOT/usr/share/icons/hicolor/256x256/apps/daypilot.png"
          ln -s /opt/daypilot/daypilot "$PKGROOT/usr/bin/daypilot"

          cat > "$PKGROOT/usr/share/applications/daypilot.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=DayPilot
          Exec=daypilot
          Icon=daypilot
          Categories=Utility;
          Terminal=false
          EOF

          cat > "$PKGROOT/DEBIAN/control" <<EOF
          Package: daypilot
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Mario Perez Carmona <mario2002pc@hotmail.com>
          Depends: libgtk-3-0, libayatana-appindicator3-1
          Description: DayPilot - personal organization and habit tracking app
           Task management, calendar, health habits, and social rivalry
           features in a single desktop app.
          EOF

          dpkg-deb --build --root-owner-group "$PKGROOT" "$GITHUB_WORKSPACE/DayPilot-Setup.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: DayPilot-Setup-deb
          path: DayPilot-Setup.deb

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DayPilot-Setup.deb